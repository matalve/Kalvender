name: Kalvender
options:
  bundleIdPrefix: se.matalve
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: BPGW64RVGJ
    CURRENT_PROJECT_VERSION: 6
    MARKETING_VERSION: "1.2"
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Kalvender:
    type: application
    platform: macOS
    sources:
      - App
      - Shared
    dependencies:
      - target: KalvenderWidget
        embed: true
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Kalvender
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: App/Kalvender.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: se.matalve.Kalvender

  KalvenderWidget:
    type: app-extension
    platform: macOS
    sources:
      - Widget
      - Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Kalvender
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/KalvenderWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: se.matalve.Kalvender.KalvenderWidget
        SKIP_INSTALL: true

schemes:
  Kalvender:
    build:
      targets:
        Kalvender: all
    run:
      config: Debug
    archive:
      config: Release
